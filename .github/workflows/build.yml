name: Build CVE-2026-43499

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Target device'
        required: true
        default: 'blazer-CP2A.260605.012'
      api:
        description: 'Android API level'
        required: true
        default: '35'
      kernel_tag:
        description: 'Kernel tag (e.g. android12-5.10.236_r00)'
        required: false
        default: ''

jobs:
  build-preload:
    name: Build preload.so
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install NDK
        run: |
          cd /tmp
          curl -fsSLo ndk.zip https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=/tmp/android-ndk-r29" >> $GITHUB_ENV
      - name: Build
        working-directory: IonStack/CVE-2026-43499/exploit
        run: make PROJECT="${{ inputs.project }}" API="${{ inputs.api }}"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: preload-${{ inputs.project }}
          path: IonStack/CVE-2026-43499/exploit/build/${{ inputs.project }}/bin/preload.so

  build-poc:
    name: Build poc
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install NDK
        run: |
          cd /tmp
          curl -fsSLo ndk.zip https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=/tmp/android-ndk-r29" >> $GITHUB_ENV
      - name: Build
        run: |
          NDK_CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ inputs.api }}-clang
          cd IonStack/CVE-2026-43499/poc
          $NDK_CC -O2 -g0 -Wall -pthread -o poc poc.c
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: poc
          path: IonStack/CVE-2026-43499/poc/poc

  build-vmlinux:
    if: ${{ inputs.kernel_tag != '' }}
    name: Build vmlinux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bc bison flex libelf-dev cpio python3 openssl libssl-dev lld gcc-aarch64-linux-gnu
          curl -fsSLo clang.tar.xz "https://github.com/llvm/llvm-project/releases/download/llvmorg-12.0.1/clang%2Bllvm-12.0.1-x86_64-linux-gnu-ubuntu-16.04.tar.xz"
          tar -xf clang.tar.xz -C /tmp
          echo "/tmp/clang+llvm-12.0.1-x86_64-linux-gnu-ubuntu-16.04/bin" >> $GITHUB_PATH
      - name: Checkout kernel
        run: |
          mkdir kernel && cd kernel
          git init
          git fetch --depth 1 https://android.googlesource.com/kernel/common refs/tags/${{ inputs.kernel_tag }}:refs/tags/${{ inputs.kernel_tag }}
          git checkout ${{ inputs.kernel_tag }}
      - name: Build vmlinux
        working-directory: kernel
        run: |
          make -s ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          printf 'CONFIG_NETFILTER_NETLINK_LOG=y\nCONFIG_NETFILTER_NETLINK_QUEUE=y\n' >> .config
          make -s ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make -s ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- -j"$(nproc)"
          ls -lh vmlinux
      - name: Extract offsets
        working-directory: kernel
        run: python3 ${{ github.workspace }}/IonStack/CVE-2026-43499/exploit/scripts/extract_offsets.py
      - name: Upload vmlinux
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux-${{ inputs.kernel_tag }}
          path: kernel/vmlinux
